name: Auto-Triage Issues

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Auto-label from title and body
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const labels = [];

            // Type from title prefix
            if (title.includes('[bug]')) labels.push('type:bug');
            else if (title.includes('[feature]')) labels.push('type:feature');
            else if (title.includes('[task]')) labels.push('type:chore');
            else if (title.includes('[spike]') || title.includes('[research]')) labels.push('type:spike');
            else if (title.includes('[infra]')) labels.push('type:chore');

            // Area from body (issue template fields)
            if (body.includes('area:') || body.includes('### area')) {
              if (body.includes('frontend')) labels.push('area:frontend');
              else if (body.includes('backend')) labels.push('area:backend');
              else if (body.includes('infra')) labels.push('area:infra');
              else if (body.includes('ros')) labels.push('area:ros');
            }
            // Area from title
            if (title.includes('[infra]') || title.includes('ci/cd') || title.includes('deploy')) {
              if (!labels.includes('area:infra')) labels.push('area:infra');
            }

            // Complexity from body
            if (body.includes('complexity')) {
              if (body.includes('low') || body.includes('simple')) labels.push('complexity:low');
              else if (body.includes('high') || body.includes('complex')) labels.push('complexity:high');
              else labels.push('complexity:medium');
            }

            // Priority from body
            if (body.includes('p0') || body.includes('critical')) labels.push('P0');
            else if (body.includes('p1') || body.includes('high priority')) labels.push('P1');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
              console.log(`Added labels: ${labels.join(', ')}`);
            }
