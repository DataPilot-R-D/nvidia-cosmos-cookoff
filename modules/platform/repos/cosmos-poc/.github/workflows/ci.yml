name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: python3 -m py_compile src/connectors/cosmos_client.py src/agents/v3/runtime.py

      - name: Run tests (skip integration)
        run: pytest tests/ -m "not integration" -v || [ $? -eq 5 ]
