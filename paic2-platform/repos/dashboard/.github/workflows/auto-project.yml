name: Auto-Add to Project

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Add to project
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: "https://github.com/orgs/DataPilot-R-D/projects/1"
          github-token: ${{ secrets.PROJECT_TOKEN }}
          # Note: PROJECT_TOKEN needs `project` scope.
          # If it expires, regenerate via:
          #   source /srv/ash-agents/shared/gh-app-token.sh
          #   Then set the new token as PROJECT_TOKEN secret
