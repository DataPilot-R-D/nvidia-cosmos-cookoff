# Executor multi-robot test config for isaac-sim-1
# Phase 2: Real navigation with readiness requirements enabled
# Key changes from default:
#   - multi_robot_enabled: true
#   - robot_ids: [robot0, h1_0] (h1_0 matches Isaac Sim namespace)
#   - require_map/tf: true, require_nav_ready: true
#   - Per-robot nav actions with h1_0 namespace

robot_task_executor_node:
  ros__parameters:
    task_request_topic: /reasoning/task_requests
    task_status_topic: /robot/task_status

    security_reports_topic: /reasoning/security_reports
    security_events_topic: /reasoning/security_events
    executor_state_topic: ~/executor_state
    set_task_state_topic: /ui/set_task_state

    nav_to_pose_action: /navigate_to_pose
    nav_through_poses_action: /navigate_through_poses
    action_server_wait_timeout_s: 5.0
    goal_timeout_s: 120.0
    cancel_timeout_s: 5.0

    executor_tick_hz: 2.0
    max_queue_size: 100
    max_active_tasks: 1
    allow_preemption: false

    # Phase 2: enable readiness requirements (map, tf, nav all live)
    require_map: true
    map_topic: /map
    map_stale_timeout_s: 5.0
    require_tf: true
    tf_topic: /tf
    tf_static_topic: /tf_static
    tf_stale_timeout_s: 2.0
    require_nav_ready: true

    publish_executor_state: true
    journal_enabled: false
    journal_path: data/executor_journal.db
    use_json_transport_fallback: true

    # Multi-robot configuration (ENABLED)
    multi_robot_enabled: true
    robot_ids: ["robot0", "h1_0"]
    robot0_nav_to_pose_action: /navigate_to_pose
    robot0_nav_through_poses_action: /navigate_through_poses
    h1_0_nav_to_pose_action: /h1_0/navigate_to_pose
    h1_0_nav_through_poses_action: /h1_0/navigate_through_poses
    h1_0_require_nav_ready: false
